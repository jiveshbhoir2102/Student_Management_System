<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#1abc9c,#3498db);

}

/* Login Card */

.login-card{

background:white;
padding:40px;
border-radius:10px;
width:350px;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

text-align:center;

}

/* Title */

.login-card h2{

margin-bottom:25px;
color:#333;

}

/* Inputs */

.login-card input,
.login-card select{

width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;

border-radius:6px;
border:1px solid #ccc;

font-size:14px;

}

/* Button */

.login-card button{

width:100%;
padding:12px;

border:none;
border-radius:6px;

background:#3498db;

color:white;
font-size:16px;

cursor:pointer;

transition:0.3s;

}

.login-card button:hover{

background:#2980b9;

}

/* Error */

.error{

color:red;
margin-top:10px;

}

.icon{

font-size:40px;
color:#3498db;
margin-bottom:10px;

}

</style>

</head>

<body>

<div class="login-card">

<img src="/Img/SMS.png" alt="Logo" width="200">

<h2>Login</h2>

<form action="/login" method="post">

<label>Select Role</label>

<select name="role">

<option value="admin">Admin</option>
<option value="student">Student</option>

</select>

<label>Enter Name</label>

<input type="text" name="name" placeholder="Enter your name" required>

<button type="submit">
<i class="fa-solid fa-right-to-bracket"></i> Login
</button>

</form>

<p class="error" th:text="${msg}"></p>

</div>

</body>

</html>
