<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI', Arial;
background:#ecf0f1;
}

/* Layout */

.container{
display:flex;
}

/* Sidebar */

.sidebar{
width:240px;
background:#2c3e50;
color:white;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li{
padding:14px;
margin:10px 0;
border-radius:6px;
transition:0.3s;
}

.sidebar ul li:hover{
background:#34495e;
}

.sidebar ul li a{
color:white;
text-decoration:none;
font-size:16px;
display:block;
}

.sidebar i{
margin-right:10px;
}

/* Main */

.main{
margin-left:260px;
padding:40px;
width:100%;
}

.main h1{
margin-bottom:30px;
}

/* Cards */

.cards{
display:flex;
gap:25px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:200px;
padding:25px;
border-radius:12px;
color:white;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

/* Card styles */

.blue{
background:linear-gradient(45deg,#2980b9,#3498db);
}

.green{
background:linear-gradient(45deg,#27ae60,#2ecc71);
}

.orange{
background:linear-gradient(45deg,#f39c12,#f1c40f);
color:black;
}

/* Card text */

.card h2{
font-size:38px;
margin:0;
}

.card p{
margin-top:8px;
font-size:18px;
}

.card i{
font-size:28px;
float:right;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<!-- Sidebar -->

<div class="sidebar">

<img src="/Img/SMS.png" alt="Logo" width="200">

<ul>

<li>
<a href="/dashboard">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>
</li>

<li>
<a href="/viewStudents">
<i class="fa-solid fa-user-graduate"></i> Students
</a>
</li>

<li>
<a href="/add">
<i class="fa-solid fa-user-plus"></i> Add Student
</a>
</li>


<li>
<a href="/courses">
<i class="fas fa-book-open"></i> courses
</a>
</li>


<li><a href="/">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</a></li>




</ul>

</div>

<!-- Main Content -->

<div class="main">

<h1>Welcome Admin 👋👋✋</h1>

<div class="cards">

<div class="card blue">
<i class="fa-solid fa-users"></i>
<h2 th:text="${students.size()}">0</h2>
<p>Total Students</p>
</div>

<div class="card green">
<i class="fa-solid fa-book"></i>
<h2 th:text="${courseCount}">0</h2>
<p>Total Courses</p>
</div>

<div class="card orange">
<i class="fa-solid fa-user-check"></i>
<h2 th:text="${students.size()}">0</h2>
<p>New Admissions</p>
</div>

</div>

</div>

</div>

</body>
</html>
